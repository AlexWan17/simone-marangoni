    <script>
        if ("serviceWorker" in navigator){
            window.addEventListener("load",()=>{
                navigator.serviceWorker.register("./sw.js");
            });
        }

        // Seleciona cirurgicamente APENAS o bloco do cartão para o efeito
        const targetCard = document.querySelector('.card');
        
        // Ativa o efeito em computadores usando o movimento do mouse
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) { 
                const xAxis = (window.innerWidth / 2 - e.pageX) / 20;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 20;
                targetCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // Reseta a posição quando o mouse sai da tela
        document.addEventListener('mouseleave', () => {
            targetCard.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // Ativa o efeito realista no celular usando o Giroscópio (Device Orientation)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (window.innerWidth <= 768) { 
                    const tiltX = Math.min(Math.max(e.gamma, -12), 12);
                    const tiltY = Math.min(Math.max(e.beta - 45, -12), 12); 
                    
                    targetCard.style.transform = `rotateY(${tiltX}deg) rotateX(${tiltY}deg)`;
                }
            });
        }

        function downloadVCF(){
            const vcf=`BEGIN:VCARD
VERSION:3.0
FN:Simone Marangoni
TITLE:Advogada
TEL;TYPE=CELL;TYPE=PREF:+5511990179403
EMAIL;TYPE=PREF,INTERNET:dr@simonemarangoni.adv.br
URL:https://simonemarangoni.adv.br
END:VCARD`;

            const blob=new Blob([vcf],{type:"text/vcard"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url;
            a.download="Simone_Marangoni.vcf";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
